name: Deploy to EdgeOne Pages

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Deploy to EdgeOne Pages
        run: |
          echo "Deploying rainbow2048 to EdgeOne Pages..."
          npx edgeone pages deploy . -n rainbow2048 -t ${{ secrets.EDGEONE_API_TOKEN }}
        env:
          EDGEONE_API_TOKEN: ${{ secrets.EDGEONE_API_TOKEN }}
