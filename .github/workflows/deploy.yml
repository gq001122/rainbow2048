name: Deploy to GitHub Pages / EdgeOne Pages

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened]

jobs:
  # 如果配置了 EDGEONE_API_TOKEN，优先部署到 EdgeOne Pages
  deploy-edgeone:
    runs-on: ubuntu-latest
    if: secrets.EDGEONE_API_TOKEN != ''
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Deploy to EdgeOne Pages
        run: |
          echo "Deploying rainbow2048 to EdgeOne Pages..."
          npx edgeone pages deploy . -n rainbow2048 -t ${{ secrets.EDGEONE_API_TOKEN }}

  # 备用：部署到 GitHub Pages
  deploy-github-pages:
    runs-on: ubuntu-latest
    if: secrets.EDGEONE_API_TOKEN == ''
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: "pages"
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
