<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌟 传奇2048</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Courier New', monospace; 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }
        
        /* 标题 */
        .title {
            text-align: center;
            margin-bottom: 20px;
        }
        .title h1 {
            font-size: 36px;
            background: linear-gradient(90deg, #ffd700, #ff8c00, #ff69b4, #ff4500, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            animation: rainbow 3s linear infinite;
        }
        @keyframes rainbow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }
        
        /* 分数面板 */
        .score-panel {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        .score-box {
            background: rgba(0,0,0,0.6);
            border: 3px solid #0f3460;
            border-radius: 8px;
            padding: 10px 20px;
            text-align: center;
            min-width: 100px;
        }
        .score-box .label {
            color: #888;
            font-size: 12px;
        }
        .score-box .value {
            color: #ffd93d;
            font-size: 24px;
            font-weight: bold;
        }
        
        /* 世界记录按钮 */
        .world-rank-btn {
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid rgba(255, 215, 0, 0.5);
            color: rgba(255, 215, 0, 0.8);
            padding: 6px 12px;
            font-size: 12px;
            font-family: inherit;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
        }
        .world-rank-btn:hover {
            background: rgba(255, 215, 0, 0.3);
            color: #ffd700;
        }
        
        /* 彩虹进度条 */
        .rainbow-progress {
            margin-bottom: 15px;
            text-align: center;
        }
        .progress-bar {
            height: 20px;
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff);
            border-radius: 10px;
            position: relative;
            border: 2px solid #fff;
        }
        .progress-indicator {
            position: absolute;
            top: -5px;
            width: 30px;
            height: 30px;
            background: #fff;
            border-radius: 50%;
            border: 3px solid #333;
            transform: translateX(-50%);
            transition: left 0.3s;
        }
        .progress-label {
            color: #fff;
            font-size: 14px;
            margin-top: 5px;
        }
        
        /* 游戏区域 */
        #gameBoard {
            position: relative;
            background: rgba(0,0,0,0.4);
            border: 4px solid #0f3460;
            border-radius: 12px;
            padding: 10px;
            touch-action: none;
        }
        
        #gridContainer {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        
        .cell {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
        }
        
        /* 方块容器 */
        #tileContainer {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
        }
        
        .tile {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            border-radius: 6px;
            transition: top 0.15s ease-out, left 0.15s ease-out;
            image-rendering: pixelated;
        }
        
        /* 彩虹颜色 - 按数值 */
        .tile-2 { background: linear-gradient(135deg, #ff4444, #cc0000); color: #fff; border: 3px solid #ff6666; }
        .tile-4 { background: linear-gradient(135deg, #ff8844, #ff6600); color: #fff; border: 3px solid #ffaa66; }
        .tile-8 { background: linear-gradient(135deg, #ffdd44, #ffaa00); color: #fff; border: 3px solid #ffee66; }
        .tile-16 { background: linear-gradient(135deg, #66dd66, #33aa33); color: #fff; border: 3px solid #88ff88; }
        .tile-32 { background: linear-gradient(135deg, #4488ff, #2255cc); color: #fff; border: 3px solid #66aaff; }
        .tile-64 { background: linear-gradient(135deg, #6644dd, #4422aa); color: #fff; border: 3px solid #8866ff; }
        .tile-128 { background: linear-gradient(135deg, #aa44dd, #8822aa); color: #fff; border: 3px solid #cc66ff; }
        .tile-256 { background: linear-gradient(135deg, #ffffff, #dddddd); color: #333; border: 4px solid #ff66ff; box-shadow: 0 0 20px #ff66ff; }
        .tile-512 { background: linear-gradient(135deg, #ffdd00, #ffaa00); color: #333; border: 4px solid #ff0; box-shadow: 0 0 25px #ff0; }
        .tile-1024 { background: linear-gradient(135deg, #fff, #ff0); color: #333; border: 4px solid #f0f; box-shadow: 0 0 30px #f0f; }
        .tile-2048 { background: linear-gradient(135deg, #f0f, #ff0, #0ff, #f00); color: #fff; border: 5px solid #fff; box-shadow: 0 0 40px #fff; animation: rainbow-glow 1s linear infinite; }
        .tile-super { background: linear-gradient(135deg, #fff, #ffd700, #ff69b4, #00ffff); color: #333; border: 5px solid #ffd700; box-shadow: 0 0 50px #ffd700; animation: rainbow-glow 0.5s linear infinite; }
        
        /* 最大数字光环 */
        .tile-max-glow {
            position: relative;
        }
        .tile-max-glow::before {
            content: '';
            position: absolute;
            top: -6px;
            left: -6px;
            right: -6px;
            bottom: -6px;
            border-radius: 10px;
            background: linear-gradient(45deg, #ffd700, #ff69b4, #00ffff, #ffd700);
            background-size: 300% 300%;
            animation: glow-border 2s linear infinite;
            z-index: -1;
        }
        .tile-max-glow::after {
            content: '';
            position: absolute;
            top: -12px;
            left: -12px;
            right: -12px;
            bottom: -12px;
            border-radius: 14px;
            background: linear-gradient(45deg, #ffd700, #ff69b4, #00ffff, #ffd700);
            background-size: 400% 400%;
            animation: glow-border 3s linear infinite reverse;
            z-index: -2;
            opacity: 0.5;
        }
        
        @keyframes glow-border {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        @keyframes rainbow-glow {
            0% { box-shadow: 0 0 40px #ff0000; }
            25% { box-shadow: 0 0 40px #ffff00; }
            50% { box-shadow: 0 0 40px #00ff00; }
            75% { box-shadow: 0 0 40px #00ffff; }
            100% { box-shadow: 0 0 40px #ff00ff; }
        }
        
        /* 合成动画 */
        .tile-new { animation: pop 0.2s ease-out; }
        .tile-merged { animation: merge 0.3s ease-out; }
        
        @keyframes pop {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes merge {
            0% { transform: scale(1.3); }
            50% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
        
        /* 合成粒子特效 */
        .merge-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            animation: particle-fly 0.5s ease-out forwards;
        }
        
        @keyframes particle-fly {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--dx), var(--dy)) scale(0);
                opacity: 0;
            }
        }
        
        /* 数字变化特效 */
        .tile-value-change {
            animation: value-bounce 0.3s ease-out;
        }
        
        @keyframes value-bounce {
            0% { transform: scale(1); }
            30% { transform: scale(1.4); }
            60% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
        
        /* 音效按钮 - 固定右上角 */
        .sound-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 20px;
            cursor: pointer;
            z-index: 999;
        }
        .sound-toggle:hover { transform: scale(1.1); }
        
        /* 操作提示 */
        .controls-hint {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-top: 15px;
        }
        
        /* 游戏结束/胜利覆盖层 */
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            z-index: 100;
        }
        .overlay.show { display: flex; }
        .overlay h2 {
            font-size: 32px;
            margin-bottom: 20px;
        }
        .overlay.game-over h2 { color: #e94560; }
        .overlay.win h2 { 
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbow 2s linear infinite;
        }
        .overlay p { color: #fff; margin-bottom: 20px; }
        .overlay button {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border: none; color: #fff;
            padding: 12px 30px; font-size: 18px;
            border-radius: 25px; cursor: pointer;
            font-family: inherit;
        }
        .overlay button:hover { transform: scale(1.05); }
        
        /* 彩虹图例 */
        .legend {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 15px;
        }
        .legend-item {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 10px;
            color: #fff;
        }
        
        /* 移动端按钮 */
        #newGameBtn {
            display: block;
            margin: 15px auto 0;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border: none; color: #fff;
            padding: 12px 30px; font-size: 16px;
            border-radius: 25px; cursor: pointer;
            font-family: inherit;
        }
        #newGameBtn:hover { transform: scale(1.05); }
        
        @media (max-width: 500px) {
            .title h1 { font-size: 28px; }
            .score-box { min-width: 80px; padding: 8px 12px; }
            .score-box .value { font-size: 18px; }
        }
        
        /* ========== 引导蒙层 ========== */
        #guideOverlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 20, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 1;
            transition: opacity 0.5s ease;
        }
        
        #guideOverlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .guide-title {
            font-size: 28px;
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 30px;
            animation: rainbow 3s linear infinite;
        }
        
        /* 演示游戏区域 */
        .guide-demo-board {
            width: 220px;
            height: 220px;
            background: rgba(0,0,0,0.5);
            border: 3px solid #0f3460;
            border-radius: 10px;
            padding: 10px;
            position: relative;
            margin-bottom: 25px;
        }
        
        .guide-demo-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            width: 100%;
            height: 100%;
        }
        
        .guide-demo-cell {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        
        /* 演示方块 */
        .guide-tile {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            border-radius: 4px;
            font-size: 14px;
            color: #fff;
            transition: all 0.3s ease;
        }
        
        .guide-tile-2 {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            border: 2px solid #ff6666;
        }
        
        .guide-tile-4 {
            background: linear-gradient(135deg, #ff8844, #ff6600);
            border: 2px solid #ffaa66;
        }
        
        /* 手指动画 */
        .guide-finger {
            position: absolute;
            width: 30px;
            height: 30px;
            font-size: 28px;
            animation: swipe-finger 2s ease-in-out infinite;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }
        
        @keyframes swipe-finger {
            0% { transform: translate(0, 0); opacity: 1; }
            25% { transform: translate(80px, 0); opacity: 1; }
            50% { transform: translate(80px, 0); opacity: 0.5; }
            75% { transform: translate(160px, 0); opacity: 1; }
            100% { transform: translate(160px, 0); opacity: 0; }
        }
        
        /* 合并特效 */
        .guide-merge-flash {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 6px;
            background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,136,68,0.5) 50%, transparent 70%);
            animation: merge-flash 0.5s ease-out forwards;
            pointer-events: none;
        }
        
        @keyframes merge-flash {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        
        /* 提示文字 */
        .guide-hint {
            color: #fff;
            font-size: 16px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .guide-hint span {
            display: inline-block;
            padding: 0 10px;
        }
        
        /* 开始按钮 */
        .guide-start-btn {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border: none;
            color: #fff;
            padding: 15px 50px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            font-family: inherit;
            animation: pulse-btn 2s ease-in-out infinite;
            box-shadow: 0 4px 20px rgba(233, 69, 96, 0.5);
        }
        
        .guide-start-btn:hover {
            transform: scale(1.05);
        }
        
        @keyframes pulse-btn {
            0%, 100% { box-shadow: 0 4px 20px rgba(233, 69, 96, 0.5); }
            50% { box-shadow: 0 4px 30px rgba(233, 69, 96, 0.8); }
        }
        
        /* 跳过提示 */
        .guide-skip {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #666;
            font-size: 14px;
            cursor: pointer;
        }
        .guide-skip:hover { color: #fff; }
        
        /* ========== 世界排行榜 ========== */
        #worldRankOverlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1001;
        }
        
        #worldRankOverlay.show {
            display: flex;
        }
        
        .rank-modal {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 3px solid #ffd700;
            border-radius: 16px;
            width: 90%;
            max-width: 380px;
            max-height: 80vh;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
        }
        
        .rank-header {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            padding: 15px;
            text-align: center;
            position: relative;
        }
        
        .rank-header h2 {
            color: #fff;
            font-size: 22px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        
        .rank-close {
            position: absolute;
            top: 10px;
            right: 15px;
            background: none;
            border: none;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            opacity: 0.8;
        }
        .rank-close:hover { opacity: 1; }
        
        .rank-content {
            padding: 15px;
            max-height: 60vh;
            overflow-y: auto;
        }
        
        /* 我的记录 */
        .my-record {
            background: rgba(255, 215, 0, 0.15);
            border: 2px solid #ffd700;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .my-record h3 {
            color: #ffd700;
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        .my-record .score {
            font-size: 36px;
            color: #fff;
            font-weight: bold;
        }
        
        .my-record .rank-info {
            color: #aaa;
            font-size: 14px;
            margin-top: 5px;
        }
        
        /* 排行榜 */
        .rank-list h3 {
            color: #fff;
            font-size: 16px;
            margin-bottom: 12px;
            text-align: center;
        }
        
        .rank-item {
            display: flex;
            align-items: center;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            margin-bottom: 8px;
        }
        
        .rank-item:nth-child(1) { background: rgba(255, 215, 0, 0.2); }
        .rank-item:nth-child(2) { background: rgba(192, 192, 192, 0.15); }
        .rank-item:nth-child(3) { background: rgba(205, 127, 50, 0.15); }
        
        .rank-position {
            width: 30px;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            margin-right: 12px;
        }
        
        .rank-item:nth-child(1) .rank-position { color: #ffd700; }
        .rank-item:nth-child(2) .rank-position { color: #c0c0c0; }
        .rank-item:nth-child(3) .rank-position { color: #cd7f32; }
        
        .rank-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            margin-right: 12px;
        }
        
        .rank-info {
            flex: 1;
        }
        
        .rank-name {
            color: #fff;
            font-size: 15px;
            font-weight: bold;
        }
        
        .rank-score {
            color: #ffd700;
            font-size: 18px;
            font-weight: bold;
            margin-left: auto;
        }
        
        /* 好友标签 */
        .friend-tag {
            background: #07c160;
            color: #fff;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 8px;
        }
        
        /* 空状态 */
        .rank-empty {
            text-align: center;
            color: #666;
            padding: 30px;
        }
        
        /* ========== 精力系统 ========== */
        #energyContainer {
            position: fixed;
            top: 70px;
            right: 20px;
            z-index: 100;
        }
        
        .energy-bar {
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.6);
            padding: 8px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255,215,0,0.3);
        }
        
        .energy-icon {
            font-size: 16px;
            margin-right: 6px;
        }
        
        .energy-info {
            font-size: 14px;
            color: #ffd700;
            margin-right: 10px;
        }
        
        .energy-value {
            font-weight: bold;
        }
        
        .energy-max {
            color: #888;
            font-size: 12px;
        }
        
        .energy-progress {
            width: 50px;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .energy-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ff8c00);
            border-radius: 3px;
            transition: width 0.3s;
        }
        
        /* 广告弹窗 */
        .ad-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        
        .ad-modal-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 2px solid #ffd700;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            min-width: 280px;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
        }
        
        .ad-modal-title {
            font-size: 20px;
            color: #ffd700;
            margin-bottom: 16px;
        }
        
        .ad-modal-body {
            color: #fff;
            margin-bottom: 20px;
            line-height: 1.8;
        }
        
        .ad-modal-body .highlight {
            color: #ffd700;
            font-weight: bold;
            font-size: 18px;
        }
        
        .ad-modal-body .current {
            color: #888;
            font-size: 13px;
        }
        
        .ad-modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        
        .ad-modal-buttons button {
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            font-family: inherit;
        }
        
        .ad-btn-cancel {
            background: rgba(255,255,255,0.1);
            color: #888;
        }
        
        .ad-btn-cancel:hover {
            background: rgba(255,255,255,0.15);
        }
        
        .ad-btn-watch {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #fff;
            font-weight: bold;

    <script>
        // ==================== 精力系统配置 ====================
        const ENERGY_CONFIG = {
            initial: 200,      // 初始精力
            max: 300,          // 精力上限
            costPerGame: 8,    // 每局消耗
            adReward: 100,     // 广告奖励
            recoverRate: 20,   // 每小时恢复
            adCooldown: 30     // 广告间隔(分钟)
        };
        
        // 精力系统状态
        let energySystem = {
            energy: ENERGY_CONFIG.initial,
            maxEnergy: ENERGY_CONFIG.max,
            lastRecoverTime: Date.now(),
            lastAdTime: 0,
            totalGames: 0
        };
        
        // 初始化精力系统
        function initEnergySystem() {
            const saved = localStorage.getItem('legend2048_energy');
            if (saved) {
                energySystem = JSON.parse(saved);
            } else {
                energySystem.energy = ENERGY_CONFIG.initial;
                energySystem.lastRecoverTime = Date.now();
            }
            
            // 计算离线恢复
            recoverEnergy();
            updateEnergyUI();
            
            // 每分钟检查恢复
            setInterval(recoverEnergy, 60000);
        }
        
        // 精力自动恢复
        function recoverEnergy() {
            const now = Date.now();
            const hoursPassed = (now - energySystem.lastRecoverTime) / (1000 * 60 * 60);
            const energyToRecover = Math.floor(hoursPassed * ENERGY_CONFIG.recoverRate);
            
            if (energyToRecover > 0) {
                energySystem.energy = Math.min(energySystem.energy + energyToRecover, ENERGY_CONFIG.max);
                energySystem.lastRecoverTime = now;
                saveEnergy();
                updateEnergyUI();
            }
        }
        
        // 保存精力数据
        function saveEnergy() {
            localStorage.setItem('legend2048_energy', JSON.stringify(energySystem));
        }
        
        // 更新精力UI
        function updateEnergyUI() {
            const valueEl = document.getElementById('energyValue');
            const fillEl = document.getElementById('energyFill');
            
            if (valueEl) valueEl.textContent = energySystem.energy;
            if (fillEl) fillEl.style.width = (energySystem.energy / ENERGY_CONFIG.max * 100) + '%';
        }
        
        // 检查精力是否足够
        function checkEnergy() {
            return energySystem.energy >= ENERGY_CONFIG.costPerGame;
        }
        
        // 扣除精力
        function consumeEnergy() {
            if (!checkEnergy()) return false;
            
            energySystem.energy -= ENERGY_CONFIG.costPerGame;
            energySystem.totalGames++;
            saveEnergy();
            updateEnergyUI();
            return true;
        }
        
        // 广告奖励精力
        function rewardEnergy() {
            energySystem.energy = Math.min(energySystem.energy + ENERGY_CONFIG.adReward, ENERGY_CONFIG.max);
            energySystem.lastAdTime = Date.now();
            saveEnergy();
            updateEnergyUI();
        }
        
        // 检查是否可以看广告
        function canWatchAd() {
            const minutesPassed = (Date.now() - energySystem.lastAdTime) / (1000 * 60);
            return minutesPassed >= ENERGY_CONFIG.adCooldown;
        }
        
        // 显示广告弹窗
        function showAdModal() {
            const modal = document.createElement('div');
            modal.className = 'ad-modal';
            modal.id = 'adModal';
            
            let cooldownText = '';
            if (!canWatchAd()) {
                const remaining = Math.ceil(ENERGY_CONFIG.adCooldown - (Date.now() - energySystem.lastAdTime) / (1000 * 60));
                cooldownText = `<p class="current">广告冷却中，还需 ${remaining} 分钟</p>`;
            }
            
            modal.innerHTML = `
                <div class="ad-modal-content">
                    <div class="ad-modal-title">⚡ 精力不足</div>
                    <div class="ad-modal-body">
                        <p>观看广告可获得 <span class="highlight">${ENERGY_CONFIG.adReward}点精力</span></p>
                        <p class="current">当前精力：${energySystem.energy} / ${ENERGY_CONFIG.max}</p>
                        <p class="current">每局消耗：${ENERGY_CONFIG.costPerGame} 点</p>
                        ${cooldownText}
                    </div>
                    <div class="ad-modal-buttons">
                        <button class="ad-btn-cancel" id="adCancelBtn">取消</button>
                        <button class="ad-btn-watch" id="adWatchBtn" ${!canWatchAd() ? 'disabled style="opacity:0.5"' : ''}>
                            ${canWatchAd() ? '观看广告' : '冷却中'}
                        </button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            // 绑定事件
            document.getElementById('adCancelBtn').onclick = () => modal.remove();
            document.getElementById('adWatchBtn').onclick = () => {
                if (canWatchAd()) {
                    modal.remove();
                    simulateWatchAd();
                }
            };
            modal.onclick = (e) => {
                if (e.target === modal) modal.remove();
            };
        }
        
        // 模拟观看广告（H5版本，微信小游戏替换为真实广告）
        function simulateWatchAd() {
            // 显示加载提示
            const loading = document.createElement('div');
            loading.className = 'ad-modal';
            loading.innerHTML = `
                <div class="ad-modal-content" style="min-width: 200px;">
                    <div style="color: #ffd700; font-size: 16px; padding: 30px;">
                        <p>🎬 模拟广告播放中...</p>
                        <p style="font-size: 12px; color: #888; margin-top: 10px;">(微信小游戏将显示真实广告)</p>
                    </div>
                </div>
            `;
            document.body.appendChild(loading);
            
            // 模拟广告播放完成
            setTimeout(() => {
                loading.remove();
                rewardEnergy();
                
                // 显示奖励提示
                wxToast(`获得 ${ENERGY_CONFIG.adReward} 点精力！`);
            }, 2000);
        }
        
        // 简易Toast提示
        function wxToast(msg) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(0,0,0,0.8);
                color: #fff;
                padding: 12px 24px;
                border-radius: 8px;
                z-index: 3000;
                font-size: 14px;
            `;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        // ==================== 游戏配置 ====================
        const CONFIG = {
            GRID_SIZE: 4,
            CELL_GAP: 8,
            ANIMATION_SPEED: 150,
        };
        
        // 彩虹颜色等级
        const RAINBOW_VALUES = [
            { value: 2, name: '红色', color: '#ff4444' },
            { value: 4, name: '橙色', color: '#ff6600' },
            { value: 8, name: '黄色', color: '#ffaa00' },
            { value: 16, name: '绿色', color: '#33aa33' },
            { value: 32, name: '蓝色', color: '#2255cc' },
            { value: 64, name: '靛色', color: '#4422aa' },
            { value: 128, name: '紫色', color: '#8822aa' },
            { value: 256, name: '白色', color: '#ffffff' },
            { value: 512, name: '金色', color: '#ffaa00' },
            { value: 1024, name: '闪耀', color: '#ffff00' },
            { value: 2048, name: '彩虹', color: '#ff00ff' },
        ];
        
        // ==================== 游戏状态 ====================
        let game = {
            grid: [],
            score: 0,
            best: 0,
            won: false,
            over: false,
            keepPlaying: false,
            cellSize: 0,
            containerWidth: 0,
        };
        
        // ==================== 音频系统 ====================
        let audioCtx = null;
        let soundEnabled = true;
        let bgmOscillator = null;
        let bgmGain = null;
        
        function initAudio() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            } catch (e) {
                console.log('Audio not supported');
            }
        }
        
        function playSound(type) {
            if (!audioCtx || !soundEnabled) return;
            
            // 恢复音频上下文（如果需要）
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            
            switch(type) {
                case 'move':
                    osc.frequency.setValueAtTime(200, now);
                    osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now);
                    osc.stop(now + 0.1);
                    break;
                    
                case 'merge':
                    osc.frequency.setValueAtTime(300, now);
                    osc.frequency.exponentialRampToValueAtTime(600, now + 0.15);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    osc.start(now);
                    osc.stop(now + 0.15);
                    break;
                    
                case 'bigMerge':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(400, now);
                    osc.frequency.exponentialRampToValueAtTime(800, now + 0.2);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                    // 添加和声
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(500, now + 0.1);
                    osc2.frequency.exponentialRampToValueAtTime(1000, now + 0.3);
                    gain2.gain.setValueAtTime(0.1, now + 0.1);
                    gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc2.start(now + 0.1);
                    osc2.stop(now + 0.3);
                    break;
                    
                case 'win':
                    const notes = [523, 659, 784, 1047];
                    notes.forEach((freq, i) => {
                        const o = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        o.connect(g);
                        g.connect(audioCtx.destination);
                        o.frequency.setValueAtTime(freq, now + i * 0.15);
                        g.gain.setValueAtTime(0.15, now + i * 0.15);
                        g.gain.exponentialRampToValueAtTime(0.01, now + i * 0.15 + 0.3);
                        o.start(now + i * 0.15);
                        o.stop(now + i * 0.15 + 0.3);
                    });
                    return;
                    
                case 'lose':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(300, now);
                    osc.frequency.exponentialRampToValueAtTime(100, now + 0.5);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    osc.start(now);
                    osc.stop(now + 0.5);
                    break;
            }
        }
        
        function startBGM() {
            if (!audioCtx || bgmOscillator || !soundEnabled) return;
            
            bgmGain = audioCtx.createGain();
            bgmGain.connect(audioCtx.destination);
            bgmGain.gain.setValueAtTime(0.03, audioCtx.currentTime);
            
            // 简单的背景旋律
            const melody = [262, 294, 330, 349, 392, 349, 330, 294];
            let noteIndex = 0;
            
            function playNote() {
                if (!soundEnabled || !bgmGain) return;
                
                const osc = audioCtx.createOscillator();
                osc.type = 'sine';
                osc.connect(bgmGain);
                osc.frequency.setValueAtTime(melody[noteIndex], audioCtx.currentTime);
                
                const noteDuration = 0.4;
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + noteDuration);
                
                noteIndex = (noteIndex + 1) % melody.length;
                
                setTimeout(playNote, noteDuration * 1000);
            }
            
            playNote();
        }
        
        function stopBGM() {
            soundEnabled = false;
            const soundToggle = document.getElementById('soundToggle');
            if (soundToggle) soundToggle.textContent = '🔇';
        }
        
        function toggleSound() {
            if (!audioCtx) initAudio();
            
            soundEnabled = !soundEnabled;
            const soundToggle = document.getElementById('soundToggle');
            if (soundToggle) {
                soundToggle.textContent = soundEnabled ? '🔊' : '🔇';
            }
            
            if (soundEnabled) {
                startBGM();
            }
        }
        
        // ==================== 初始化 ====================
        const tileContainer = document.getElementById('tileContainer');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const progressIndicator = document.getElementById('progressIndicator');
        const progressLabel = document.getElementById('progressLabel');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const winOverlay = document.getElementById('winOverlay');
        
        function init() {
            initEnergySystem();  // 初始化精力系统
            loadBest();
            setupGame(true);  // 初始化游戏，跳过精力检查
            setupInput();
            setupButtons();
            initAudio();
            initGuide();
        }
        
        // ==================== 引导蒙层 ====================
        function initGuide() {
            const guideOverlay = document.getElementById('guideOverlay');
            const guideStartBtn = document.getElementById('guideStartBtn');
            const guideSkip = document.getElementById('guideSkip');
            
            // 检查是否首次进入游戏
            const hasPlayed = localStorage.getItem('rainbow2048_played');
            
            if (hasPlayed) {
                // 非首次，直接隐藏
                guideOverlay.classList.add('hidden');
                return;
            }
            
            // 首次进入，启动引导动画
            startGuideAnimation();
            
            // 点击开始按钮
            guideStartBtn.addEventListener('click', closeGuide);
            guideSkip.addEventListener('click', closeGuide);
            
            // 点击蒙层任意处也可关闭
            guideOverlay.addEventListener('click', (e) => {
                if (e.target === guideOverlay) {
                    closeGuide();
                }
            });
        }
        
        function startGuideAnimation() {
            const tile1 = document.getElementById('guideTile1');
            const tile2 = document.getElementById('guideTile2');
            const tile3 = document.getElementById('guideTile3');
            const finger = document.getElementById('guideFinger');
            
            // 重置状态
            tile1.style.opacity = '1';
            tile1.style.left = '10px';
            tile2.style.opacity = '1';
            tile2.style.left = '60px';
            tile3.style.opacity = '0';
            finger.style.opacity = '1';
            finger.style.left = '10px';
            finger.style.top = '10px';
            
            // 动画循环
            let animating = true;
            
            function animate() {
                if (!animating) return;
                
                // 重置
                tile1.style.opacity = '1';
                tile1.style.left = '10px';
                tile2.style.opacity = '1';
                tile2.style.left = '60px';
                tile3.style.opacity = '0';
                finger.style.opacity = '1';
                finger.style.left = '10px';
                
                // 延迟后开始动画
                setTimeout(() => {
                    if (!animating) return;
                    
                    // 手指移动到第一个方块
                    finger.style.left = '15px';
                    finger.style.top = '15px';
                    
                    // 手指向右滑
                    setTimeout(() => {
                        if (!animating) return;
                        finger.style.left = '65px';
                        finger.style.top = '65px';
                        tile1.style.left = '65px';
                    }, 300);
                    
                    // 继续向右滑，触发合并
                    setTimeout(() => {
                        if (!animating) return;
                        finger.style.left = '115px';
                        tile1.style.left = '115px';
                        tile2.style.left = '60px'; // tile2移动到tile1原位置
                    }, 600);
                    
                    // 合并效果
                    setTimeout(() => {
                        if (!animating) return;
                        tile1.style.opacity = '0';
                        tile2.style.opacity = '0';
                        tile3.style.opacity = '1';
                        
                        // 合并闪光
                        const board = document.getElementById('guideDemoBoard');
                        const flash = document.createElement('div');
                        flash.className = 'guide-merge-flash';
                        flash.style.left = '110px';
                        flash.style.top = '55px';
                        board.appendChild(flash);
                        
                        setTimeout(() => flash.remove(), 500);
                    }, 900);
                    
                }, 500);
            }
            
            // 开始循环动画
            animate();
            setInterval(animate, 3000);
        }
        
        function closeGuide() {
            const guideOverlay = document.getElementById('guideOverlay');
            guideOverlay.classList.add('hidden');
            
            // 标记已玩过
            localStorage.setItem('rainbow2048_played', 'true');
            
            // 2秒后移除元素
            setTimeout(() => {
                guideOverlay.remove();
            }, 2000);
        }
        
        function setupGame(skipEnergyCheck = false) {
            // 如果不是初始化调用，需要检查精力
            if (!skipEnergyCheck) {
                if (!checkEnergy()) {
                    showAdModal();
                    return false;
                }
                consumeEnergy();
            }
            
            game.grid = Array(CONFIG.GRID_SIZE).fill(null).map(() => Array(CONFIG.GRID_SIZE).fill(0));
            game.score = 0;
            game.won = false;
            game.over = false;
            game.keepPlaying = false;
            currentMaxValue = 0;
            
            calculateSizes();
            addRandomTile();
            addRandomTile();
            render();
            updateUI();
            
            gameOverOverlay.classList.remove('show');
            winOverlay.classList.remove('show');
            return true;
        }
        
        function calculateSizes() {
            const board = document.getElementById('gameBoard');
            game.containerWidth = board.clientWidth - 20;
            game.cellSize = (game.containerWidth - CONFIG.CELL_GAP * 5) / CONFIG.GRID_SIZE;
        }
        
        function loadBest() {
            const saved = localStorage.getItem('rainbow2048_best');
            game.best = saved ? parseInt(saved) : 0;
        }
        
        function saveBest() {
            if (game.score > game.best) {
                game.best = game.score;
                localStorage.setItem('rainbow2048_best', game.best);
            }
        }
        
        // ==================== 方块操作 ====================
        function addRandomTile() {
            const empty = [];
            for (let r = 0; r < CONFIG.GRID_SIZE; r++) {
                for (let c = 0; c < CONFIG.GRID_SIZE; c++) {
                    if (game.grid[r][c] === 0) empty.push({ r, c });
                }
            }
            if (empty.length === 0) return false;
            
            const { r, c } = empty[Math.floor(Math.random() * empty.length)];
            game.grid[r][c] = Math.random() < 0.9 ? 2 : 4;
            return true;
        }
        
        function move(direction) {
            if (game.over && !game.keepPlaying) return false;
            
            let moved = false;
            let mergedPositions = [];
            let maxValueBefore = Math.max(...game.grid.flat());
            const oldGrid = game.grid.map(row => [...row]);
            
            if (direction === 'left' || direction === 'right') {
                for (let r = 0; r < CONFIG.GRID_SIZE; r++) {
                    const row = game.grid[r].filter(v => v !== 0);
                    if (direction === 'right') row.reverse();
                    
                    for (let i = 0; i < row.length - 1; i++) {
                        if (row[i] === row[i + 1]) {
                            row[i] *= 2;
                            game.score += row[i];
                            mergedPositions.push({ r, c: direction === 'left' ? i : (CONFIG.GRID_SIZE - 1 - i), value: row[i] });
                            row.splice(i + 1, 1);
                            moved = true;
                        }
                    }
                    
                    while (row.length < CONFIG.GRID_SIZE) row.push(0);
                    if (direction === 'right') row.reverse();
                    game.grid[r] = row;
                }
            } else {
                for (let c = 0; c < CONFIG.GRID_SIZE; c++) {
                    let col = [];
                    for (let r = 0; r < CONFIG.GRID_SIZE; r++) {
                        if (game.grid[r][c] !== 0) col.push(game.grid[r][c]);
                    }
                    if (direction === 'down') col.reverse();
                    
                    for (let i = 0; i < col.length - 1; i++) {
                        if (col[i] === col[i + 1]) {
                            col[i] *= 2;
                            game.score += col[i];
                            mergedPositions.push({ r: direction === 'up' ? i : (CONFIG.GRID_SIZE - 1 - i), c, value: col[i] });
                            col.splice(i + 1, 1);
                            moved = true;
                        }
                    }
                    
                    while (col.length < CONFIG.GRID_SIZE) col.push(0);
                    if (direction === 'down') col.reverse();
                    for (let r = 0; r < CONFIG.GRID_SIZE; r++) {
                        game.grid[r][c] = col[r];
                    }
                }
            }
            
            // 检查是否移动了
            for (let r = 0; r < CONFIG.GRID_SIZE; r++) {
                for (let c = 0; c < CONFIG.GRID_SIZE; c++) {
                    if (oldGrid[r][c] !== game.grid[r][c]) {
                        moved = true;
                        break;
                    }
                }
                if (moved) break;
            }
            
            if (moved) {
                playSound('move');
                addRandomTile();
                render();
                
                // 播放合成音效和特效
                const maxValueAfter = Math.max(...game.grid.flat());
                mergedPositions.forEach(pos => {
                    if (pos.value >= 128) {
                        playSound('bigMerge');
                    } else {
                        playSound('merge');
                    }
                    // 添加粒子特效
                    setTimeout(() => {
                        createMergeParticles(pos.r, pos.c, pos.value);
                    }, 100);
                });
                
                updateUI();
                
                // 检查胜利
                if (!game.won && !game.keepPlaying) {
                    for (let r = 0; r < CONFIG.GRID_SIZE; r++) {
                        for (let c = 0; c < CONFIG.GRID_SIZE; c++) {
                            if (game.grid[r][c] === 2048) {
                                game.won = true;
                                playSound('win');
                                setTimeout(() => winOverlay.classList.add('show'), 300);
                            }
                        }
                    }
                }
                
                // 检查游戏结束
                if (!canMove()) {
                    game.over = true;
                    saveBest();
                    playSound('lose');
                    setTimeout(() => {
                        document.getElementById('finalScore').textContent = game.score;
                        gameOverOverlay.classList.add('show');
                    }, 300);
                }
            }
            
            return moved;
        }
        
        // 创建合成粒子特效
        function createMergeParticles(row, col, value) {
            const x = col * (game.cellSize + CONFIG.CELL_GAP) + game.cellSize / 2;
            const y = row * (game.cellSize + CONFIG.CELL_GAP) + game.cellSize / 2;
            
            const colors = ['#ff4444', '#ff8844', '#ffdd44', '#66dd66', '#4488ff', '#aa44dd', '#ff69b4', '#ffd700'];
            const particleCount = Math.min(12, 4 + Math.log2(value));
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'merge-particle';
                
                const angle = (i / particleCount) * Math.PI * 2;
                const distance = 30 + Math.random() * 20;
                const dx = Math.cos(angle) * distance;
                const dy = Math.sin(angle) * distance;
                
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.setProperty('--dx', dx + 'px');
                particle.style.setProperty('--dy', dy + 'px');
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                
                tileContainer.appendChild(particle);
                
                setTimeout(() => particle.remove(), 500);
            }
        }
        
        function canMove() {
            // 检查是否有空格
            for (let r = 0; r < CONFIG.GRID_SIZE; r++) {
                for (let c = 0; c < CONFIG.GRID_SIZE; c++) {
                    if (game.grid[r][c] === 0) return true;
                }
            }
            // 检查是否有可合并的相邻方块
            for (let r = 0; r < CONFIG.GRID_SIZE; r++) {
                for (let c = 0; c < CONFIG.GRID_SIZE; c++) {
                    const val = game.grid[r][c];
                    if (r < CONFIG.GRID_SIZE - 1 && game.grid[r + 1][c] === val) return true;
                    if (c < CONFIG.GRID_SIZE - 1 && game.grid[r][c + 1] === val) return true;
                }
            }
            return false;
        }
        
        // ==================== 渲染 ====================
        let currentMaxValue = 0;
        
        function render() {
            tileContainer.innerHTML = '';
            
            // 找出当前最大数字
            let maxValue = 0;
            for (let r = 0; r < CONFIG.GRID_SIZE; r++) {
                for (let c = 0; c < CONFIG.GRID_SIZE; c++) {
                    if (game.grid[r][c] > maxValue) {
                        maxValue = game.grid[r][c];
                    }
                }
            }
            
            // 检查是否出现了新的更大数字
            let newMaxAppeared = maxValue > currentMaxValue;
            if (newMaxAppeared) {
                currentMaxValue = maxValue;
            }
            
            for (let r = 0; r < CONFIG.GRID_SIZE; r++) {
                for (let c = 0; c < CONFIG.GRID_SIZE; c++) {
                    const value = game.grid[r][c];
                    if (value === 0) continue;
                    
                    const tile = document.createElement('div');
                    
                    // 确定样式类
                    let tileClass = 'tile tile-new';
                    if (value > 2048) {
                        tileClass += ' tile-super';
                    } else {
                        tileClass += ' tile-' + value;
                    }
                    
                    // 如果是最大数字且出现了新最大，添加光环
                    if (value === maxValue && newMaxAppeared && value >= 256) {
                        tileClass += ' tile-max-glow';
                    }
                    
                    tile.className = tileClass;
                    
                    const x = c * (game.cellSize + CONFIG.CELL_GAP);
                    const y = r * (game.cellSize + CONFIG.CELL_GAP);
                    
                    tile.style.left = x + 'px';
                    tile.style.top = y + 'px';
                    tile.style.width = game.cellSize + 'px';
                    tile.style.height = game.cellSize + 'px';
                    tile.style.fontSize = (game.cellSize / 3) + 'px';
                    tile.textContent = value;
                    
                    tileContainer.appendChild(tile);
                }
            }
        }
        
        function updateUI() {
            scoreEl.textContent = game.score;
            bestEl.textContent = game.best;
            
            // 更新彩虹进度
            const maxValue = 2048;
            const maxTile = Math.max(...game.grid.flat());
            const progress = Math.min(100, (Math.log2(maxTile) / Math.log2(maxValue)) * 100);
            
            progressIndicator.style.left = progress + '%';
            
            const rainbowInfo = RAINBOW_VALUES.find(v => v.value === maxTile) || RAINBOW_VALUES[RAINBOW_VALUES.length - 1];
            progressLabel.textContent = rainbowInfo.name + ' ' + maxTile;
        }
        
        // ==================== 输入处理 ====================
        function setupInput() {
            // 键盘
            document.addEventListener('keydown', (e) => {
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                    e.preventDefault();
                    const dir = e.key.replace('Arrow', '').toLowerCase();
                    move(dir);
                }
            });
            
            // 触摸滑动
            let startX, startY;
            const board = document.getElementById('gameBoard');
            
            board.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
            }, { passive: true });
            
            board.addEventListener('touchend', (e) => {
                if (!startX || !startY) return;
                
                const endX = e.changedTouches[0].clientX;
                const endY = e.changedTouches[0].clientY;
                const dx = endX - startX;
                const dy = endY - startY;
                
                const minSwipe = 30;
                
                if (Math.abs(dx) > Math.abs(dy)) {
                    if (Math.abs(dx) > minSwipe) {
                        move(dx > 0 ? 'right' : 'left');
                    }
                } else {
                    if (Math.abs(dy) > minSwipe) {
                        move(dy > 0 ? 'down' : 'up');
                    }
                }
                
                startX = startY = null;
            }, { passive: true });
            
            // 窗口大小变化
            window.addEventListener('resize', () => {
                calculateSizes();
                render();
            });
        }
        
        function setupButtons() {
            document.getElementById('newGameBtn').addEventListener('click', setupGame);
            document.getElementById('retryBtn').addEventListener('click', setupGame);
            document.getElementById('newGameAfterWinBtn').addEventListener('click', setupGame);
            document.getElementById('continueBtn').addEventListener('click', () => {
                game.keepPlaying = true;
                winOverlay.classList.remove('show');
            });
            document.getElementById('soundToggle').addEventListener('click', () => {
                toggleSound();
            });
            
            // 世界记录按钮
            document.getElementById('worldRankBtn').addEventListener('click', openWorldRank);
            document.getElementById('rankCloseBtn').addEventListener('click', closeWorldRank);
            document.getElementById('worldRankOverlay').addEventListener('click', (e) => {
                if (e.target.id === 'worldRankOverlay') {
                    closeWorldRank();
                }
            });
        }
        
        // ==================== 世界排行榜 ====================
        // 模拟数据（实际项目中替换为真实API）
        const WORLD_RANK_DATA = [
            { name: '游戏达人', score: 88640, avatar: '🎮', isFriend: false },
            { name: '小明', score: 72450, avatar: '😎', isFriend: true },
            { name: '数字大师', score: 65320, avatar: '🏆', isFriend: false },
            { name: '小红', score: 58900, avatar: '🌟', isFriend: true },
            { name: '2048高手', score: 52180, avatar: '💯', isFriend: false },
            { name: '张三', score: 45670, avatar: '🎯', isFriend: false },
            { name: '李四', score: 38920, avatar: '🔥', isFriend: false },
            { name: '王五', score: 31450, avatar: '⚡', isFriend: false },
        ];
        
        function openWorldRank() {
            const overlay = document.getElementById('worldRankOverlay');
            overlay.classList.add('show');
            
            // 显示我的记录
            const myScore = game.best;
            document.getElementById('myRankScore').textContent = myScore;
            
            // 计算我的排名
            const myRank = WORLD_RANK_DATA.filter(p => p.score > myScore).length + 1;
            document.getElementById('myRankPosition').textContent = myRank;
            
            // 渲染排行榜
            renderWorldRank();
        }
        
        function closeWorldRank() {
            document.getElementById('worldRankOverlay').classList.remove('show');
        }
        
        function renderWorldRank() {
            const container = document.getElementById('rankListContainer');
            
            // 只取前50名
            const top50 = WORLD_RANK_DATA.slice(0, 50);
            
            if (top50.length === 0) {
                container.innerHTML = '<div class="rank-empty">暂无记录，快来成为第一个上榜的吧！</div>';
                return;
            }
            
            const myScore = game.best;
            
            let html = '';
            top50.forEach((player, index) => {
                const position = index + 1;
                const positionIcon = position <= 3 ? ['🥇', '🥈', '🥉'][position - 1] : position;
                const isMe = player.score === myScore && index < 20;
                
                html += `
                    <div class="rank-item" ${isMe ? 'style="border: 2px solid #ffd700;"' : ''}>
                        <div class="rank-position">${positionIcon}</div>
                        <div class="rank-avatar">${player.avatar}</div>
                        <div class="rank-info">
                            <div class="rank-name">
                                ${player.name}
                                ${player.isFriend ? '<span class="friend-tag">好友</span>' : ''}
                                ${isMe ? '<span class="friend-tag" style="background:#ffd700;color:#333;">我</span>' : ''}
                            </div>
                        </div>
                        <div class="rank-score">${player.score.toLocaleString()}</div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        // 启动游戏
        init();
    </script>
</body>
